<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>lost_memory.exe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#d7d2d7;
font-family:Arial,sans-serif;
color:white;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
pointer-events:none;
opacity:.05;
background-image:
radial-gradient(circle,#fff 1px,transparent 1px);
background-size:4px 4px;
animation:noise .2s infinite;
}

@keyframes noise{
0%{transform:translate(0)}
25%{transform:translate(1px,-1px)}
50%{transform:translate(-1px,1px)}
75%{transform:translate(1px,1px)}
100%{transform:translate(0)}
}

header{
padding:26px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(8px);
border-bottom:1px solid rgba(255,255,255,.1);
}

header h1{
font-size:52px;
font-weight:200;
letter-spacing:4px;
}

header p{
margin-top:10px;
opacity:.7;
}

.container{
display:flex;
flex-wrap:wrap;
gap:24px;
padding:24px;
}

.panel{
width:320px;
background:rgba(255,255,255,.1);
padding:24px;
border-radius:28px;
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

.preview{
flex:1;
min-height:80vh;
background:rgba(0,0,0,.18);
border-radius:32px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.preview img{
max-width:90%;
max-height:85vh;
border-radius:18px;
transition:.3s;
box-shadow:0 0 40px rgba(0,0,0,.35);
}

.scanlines{
position:absolute;
inset:0;
pointer-events:none;
background:
linear-gradient(
to bottom,
transparent 50%,
rgba(255,255,255,.03) 51%
);
background-size:100% 4px;
opacity:.25;
}

.topText{
position:absolute;
top:22px;
left:22px;
font-size:14px;
letter-spacing:4px;
opacity:.7;
}

.time{
position:absolute;
bottom:24px;
left:24px;
font-size:14px;
line-height:1.8;
opacity:.7;
}

.quote{
position:absolute;
right:24px;
bottom:24px;
max-width:220px;
font-size:18px;
line-height:1.6;
opacity:.7;
}

button,
select,
input[type=range]{

width:100%;
margin-top:14px;
padding:14px;
border:none;
border-radius:18px;
background:#f1dce5;
font-size:15px;
}

input[type=file]{
margin-top:16px;
width:100%;
}

label{
display:block;
margin-top:16px;
opacity:.8;
font-size:14px;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.panel{
width:100%;
}

.preview{
min-height:60vh;
}

header h1{
font-size:38px;
}

}

</style>
</head>

<body>

<header>
<h1>lost_memory.exe</h1>
<p>traumacore / dreamcore image generator</p>
</header>

<div class="container">

<div class="panel">

<h2>Upload Memory</h2>

<input type="file" id="upload">

<select id="preset">
<option value="trauma">Traumacore</option>
<option value="dream">Dreamcore</option>
<option value="vhs">VHS</option>
<option value="ccd">Old CCD</option>
<option value="emo">Emo Web</option>
</select>

<label>Blur</label>
<input type="range" id="blur" min="0" max="2" value="1">

<label>Brightness</label>
<input type="range" id="brightness" min="60" max="140" value="90">

<label>Contrast</label>
<input type="range" id="contrast" min="60" max="140" value="80">

<label>Saturation</label>
<input type="range" id="saturation" min="0" max="140" value="70">

<button onclick="downloadImage()">
Export PNG
</button>

<p style="margin-top:24px;opacity:.5;">
everything feels far away.
</p>

</div>

<div class="preview">

<div class="topText">
PLAY ▶ REC ●
</div>

<img
id="previewImage"
src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
/>

<div class="scanlines"></div>

<div class="time">
PM 11:47<br>
MAR.15 2003
</div>

<div class="quote">
i can't remember anymore.
</div>

</div>

</div>

<script>

const upload = document.getElementById('upload')
const preview = document.getElementById('previewImage')

const blur = document.getElementById('blur')
const brightness = document.getElementById('brightness')
const contrast = document.getElementById('contrast')
const saturation = document.getElementById('saturation')
const preset = document.getElementById('preset')

upload.addEventListener('change',(e)=>{

const file = e.target.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(event){

const img = new Image()

img.onload = function(){

const canvas = document.createElement('canvas')
const ctx = canvas.getContext('2d')

const MAX = 1400

let w = img.width
let h = img.height

if(w > MAX){

h *= MAX / w
w = MAX

}

canvas.width = w
canvas.height = h

ctx.drawImage(img,0,0,w,h)

preview.src = canvas.toDataURL('image/jpeg',0.85)

}

img.src = event.target.result

}

reader.readAsDataURL(file)

})

function updateFilter(){

let extra = ''

if(preset.value === 'dream'){
extra += ' hue-rotate(-8deg)'
}

if(preset.value === 'vhs'){
extra += ' sepia(10%)'
}

if(preset.value === 'ccd'){
extra += ' saturate(120%) contrast(90%)'
}

if(preset.value === 'emo'){
extra += ' grayscale(25%)'
}

preview.style.filter = `
blur(${blur.value}px)
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
${extra}
`

}

blur.oninput = updateFilter
brightness.oninput = updateFilter
contrast.oninput = updateFilter
saturation.oninput = updateFilter
preset.onchange = updateFilter

updateFilter()

function downloadImage(){

const canvas = document.createElement('canvas')
const ctx = canvas.getContext('2d')

const img = preview

const w = img.naturalWidth
const h = img.naturalHeight

canvas.width = w
canvas.height = h

let filter = `
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
`

if(blur.value > 0){
filter += ` blur(${Math.min(blur.value,2)}px)`
}

if(preset.value === 'dream'){
filter += ' hue-rotate(-8deg)'
}

if(preset.value === 'vhs'){
filter += ' sepia(10%)'
}

if(preset.value === 'ccd'){
filter += ' saturate(120%)'
}

if(preset.value === 'emo'){
filter += ' grayscale(25%)'
}

ctx.filter = filter

ctx.drawImage(img,0,0,w,h)


// VHS 偏移
ctx.globalAlpha = .08

ctx.drawImage(
img,
-3,
2,
w,
h
)

ctx.globalAlpha = 1


// 噪点
for(let i=0;i<700;i++){

const x = Math.random()*w
const y = Math.random()*h

const alpha = Math.random()*0.12

ctx.fillStyle =
`rgba(255,255,255,${alpha})`

ctx.fillRect(x,y,1,1)

}


// 暗角
const gradient =
ctx.createRadialGradient(
w/2,
h/2,
w/4,
w/2,
h/2,
w/1.2
)

gradient.addColorStop(0,'rgba(0,0,0,0)')
gradient.addColorStop(1,'rgba(0,0,0,0.35)')

ctx.fillStyle = gradient
ctx.fillRect(0,0,w,h)


// 时间文字
ctx.font = '16px monospace'
ctx.fillStyle = 'rgba(255,255,255,0.7)'

ctx.fillText(
'PLAY ▶ REC ●',
20,
30
)

ctx.fillText(
'PM 11:47',
20,
h-40
)

ctx.fillText(
'MAR.15 2003',
20,
h-20
)


// traumacore句子
const quotes = [

'everything feels far away',
'please don't leave again',
'i miss the old internet',
'was any of it real?',
'you forgot me already',
'2007 felt warmer'

]

const q =
quotes[Math.floor(Math.random()*quotes.length)]

ctx.font = '22px Arial'

ctx.fillStyle =
'rgba(255,255,255,0.6)'

ctx.fillText(
q,
w-320,
h-50
)


// 导出
const link =
document.createElement('a')

link.download =
'lost_memory.png'

link.href =
canvas.toDataURL(
'image/jpeg',
0.92
)

link.click()

}

</script>

</body>
</html>
