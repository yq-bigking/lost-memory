<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>lost_memory.exe</title>

  <style>
    body{
      margin:0;
      background:#d9d1d6;
      color:white;
      font-family:Arial, sans-serif;
      overflow-x:hidden;
    }

    .noise{
      position:fixed;
      inset:0;
      opacity:.08;
      pointer-events:none;
      background-image:url("https://grainy-gradients.vercel.app/noise.svg");
    }

    header{
      padding:20px;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.15);
    }

    h1{
      margin:0;
      font-weight:300;
      letter-spacing:2px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      padding:20px;
    }

    .panel{
      width:300px;
      background:rgba(255,255,255,.1);
      padding:20px;
      border-radius:24px;
      backdrop-filter:blur(14px);
    }

    .preview{
      flex:1;
      min-height:80vh;
      background:rgba(0,0,0,.25);
      border-radius:30px;
      position:relative;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .preview img{
      max-width:80%;
      max-height:80vh;
      border-radius:20px;
      filter:
        brightness(90%)
        contrast(75%)
        saturate(60%)
        blur(1px);
      opacity:.9;
      box-shadow:0 0 50px rgba(0,0,0,.4);
    }

    .scanlines{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
      linear-gradient(
      to bottom,
      transparent 50%,
      rgba(255,255,255,.05) 51%);
      background-size:100% 4px;
      opacity:.3;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:18px;
      background:#f2dce6;
      color:#222;
      cursor:pointer;
      font-size:15px;
    }

    input[type=file]{
      margin-top:10px;
      width:100%;
    }

    .timestamp{
      position:absolute;
      bottom:20px;
      left:20px;
      opacity:.7;
      font-size:14px;
      letter-spacing:2px;
    }

    .toptext{
      position:absolute;
      top:20px;
      left:20px;
      opacity:.8;
      letter-spacing:3px;
    }

    .quote{
      position:absolute;
      right:30px;
      bottom:30px;
      opacity:.6;
      font-size:18px;
      max-width:220px;
      line-height:1.6;
    }

  </style>
</head>

<body>

<div class="noise"></div>

<header>
  <h1>lost_memory.exe</h1>
  <p>traumacore / dreamcore image generator</p>
</header>

<div class="container">

  <div class="panel">
    <h2>Upload Memory</h2>

    <input type="file" id="upload"/>

    <button onclick="downloadImage()">
      Export Image
    </button>

    <p style="opacity:.6;margin-top:20px;">
      everything feels far away.
    </p>
  </div>

  <div class="preview">

    <div class="toptext">
      PLAY ▶
    </div>

    <img id="previewImage"
    src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"/>

    <div class="scanlines"></div>

    <div class="timestamp">
      PM 10:47<br/>
      MAR. 15 2003
    </div>

    <div class="quote">
      “I can't remember what it felt like anymore.”
    </div>

  </div>

</div>

<script>

const upload = document.getElementById('upload')
const preview = document.getElementById('previewImage')

upload.addEventListener('change', (e)=>{

  const file = e.target.files[0]

  if(file){

    preview.src = URL.createObjectURL(file)

  }

})

function downloadImage(){

  alert('Right click or screenshot to save image.')

}

</script>

</body>
</html>
