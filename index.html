<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>lost_memory.exe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#d7d0d7;
font-family:Arial,sans-serif;
overflow-x:hidden;
color:white;
min-height:100vh;
}

/* 雪花 */

.snow{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:1;
}

.snow span{
position:absolute;
top:-10px;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.7;
animation:snowfall linear infinite;
}

@keyframes snowfall{
to{
transform:translateY(110vh);
}
}

/* 顶部 */

header{
padding:24px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(8px);
border-bottom:1px solid rgba(255,255,255,.1);
position:relative;
z-index:2;
}

header h1{
font-size:46px;
font-weight:200;
letter-spacing:4px;
}

header p{
margin-top:8px;
opacity:.7;
}

/* 主体 */

.container{
display:flex;
flex-wrap:wrap;
gap:24px;
padding:24px;
position:relative;
z-index:2;
}

/* 面板 */

.panel{
width:320px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:24px;
border-radius:28px;
}

.panel h2{
margin-bottom:20px;
font-weight:300;
}

input,
select,
button{
width:100%;
margin-top:14px;
padding:14px;
border:none;
border-radius:18px;
font-size:15px;
}

button{
background:#f1dce4;
}

label{
display:block;
margin-top:18px;
opacity:.7;
font-size:14px;
}

/* 预览 */

.preview{
flex:1;
min-height:80vh;
border-radius:32px;
background:rgba(0,0,0,.2);
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.preview img{
max-width:92%;
max-height:85vh;
border-radius:18px;
box-shadow:0 0 50px rgba(0,0,0,.4);
}

/* VHS扫描线 */

.scanlines{
position:absolute;
inset:0;
pointer-events:none;
background:
linear-gradient(
to bottom,
transparent 50%,
rgba(255,255,255,.04) 51%
);
background-size:100% 4px;
mix-blend-mode:overlay;
opacity:.25;
}

/* 文字 */

.overlay-top{
position:absolute;
top:24px;
left:24px;
font-size:14px;
opacity:.7;
letter-spacing:3px;
}

.overlay-time{
position:absolute;
bottom:24px;
left:24px;
font-size:15px;
line-height:1.8;
opacity:.75;
letter-spacing:2px;
}

.overlay-quote{
position:absolute;
right:24px;
bottom:24px;
max-width:200px;
line-height:1.6;
font-size:17px;
opacity:.7;
}

/* 手机 */

@media(max-width:900px){

.container{
flex-direction:column;
}

.panel{
width:100%;
}

.preview{
min-height:60vh;
}

header h1{
font-size:34px;
}

}

</style>
</head>

<body>

<div class="snow" id="snow"></div>

<header>
<h1>lost_memory.exe</h1>
<p>traumacore / dreamcore editor</p>
</header>

<div class="container">

<div class="panel">

<h2>Upload Memory</h2>

<input type="file" id="upload">

<select id="preset">
<option value="trauma">Traumacore</option>
<option value="dream">Dreamcore</option>
<option value="vhs">VHS</option>
<option value="ccd">Old CCD</option>
<option value="emo">Emo Web</option>
</select>

<label>Blur</label>
<input type="range" id="blur" min="0" max="2" value="1">

<label>Brightness</label>
<input type="range" id="brightness" min="70" max="130" value="90">

<label>Contrast</label>
<input type="range" id="contrast" min="60" max="130" value="85">

<label>Saturation</label>
<input type="range" id="saturation" min="20" max="130" value="70">

<button onclick="downloadImage()">
Export PNG
</button>

<p style="margin-top:20px;opacity:.5;">
everything feels far away.
</p>

</div>

<div class="preview">

<img
id="previewImage"
src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
/>

<div class="scanlines"></div>

<div class="overlay-top">
PLAY ▶ REC ●
</div>

<div class="overlay-time">
PM 11:47<br>
MAR.15 2003
</div>

<div class="overlay-quote">
i can't remember anymore.
</div>

</div>

</div>

<script>

const upload = document.getElementById('upload')
const preview = document.getElementById('previewImage')

const blur = document.getElementById('blur')
const brightness = document.getElementById('brightness')
const contrast = document.getElementById('contrast')
const saturation = document.getElementById('saturation')
const preset = document.getElementById('preset')

/* 上传 */

upload.addEventListener('change',(e)=>{

const file = e.target.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(event){

preview.src = event.target.result

}

reader.readAsDataURL(file)

})

/* 滤镜 */

function updateFilter(){

let extra = ''

if(preset.value === 'dream'){
extra = ' hue-rotate(-10deg)'
}

if(preset.value === 'vhs'){
extra = ' sepia(18%)'
}

if(preset.value === 'ccd'){
extra = ' saturate(120%) contrast(90%)'
}

if(preset.value === 'emo'){
extra = ' grayscale(35%)'
}

preview.style.filter = `
blur(${blur.value}px)
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
${extra}
`

}

blur.oninput = updateFilter
brightness.oninput = updateFilter
contrast.oninput = updateFilter
saturation.oninput = updateFilter
preset.onchange = updateFilter

updateFilter()

/* 导出 */

function downloadImage(){

const canvas = document.createElement('canvas')
const ctx = canvas.getContext('2d')

const img = new Image()

img.crossOrigin = "anonymous"

img.onload = function(){

canvas.width = img.width
canvas.height = img.height

let filter = `
blur(${blur.value}px)
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
`

if(preset.value === 'dream'){
filter += ' hue-rotate(-10deg)'
}

if(preset.value === 'vhs'){
filter += ' sepia(18%)'
}

if(preset.value === 'ccd'){
filter += ' saturate(120%) contrast(90%)'
}

if(preset.value === 'emo'){
filter += ' grayscale(35%)'
}

ctx.filter = filter

ctx.drawImage(img,0,0)

/* VHS噪点 */

for(let i=0;i<1200;i++){

const x = Math.random()*canvas.width
const y = Math.random()*canvas.height

ctx.fillStyle =
`rgba(255,255,255,${Math.random()*0.08})`

ctx.fillRect(x,y,1,1)

}

/* traumacore文字 */

ctx.fillStyle = 'rgba(255,255,255,.65)'

ctx.font = '28px Arial'

ctx.fillText(
'everything feels far away.',
40,
canvas.height - 60
)

ctx.font = '18px monospace'

ctx.fillText(
'PM 11:47  MAR.15 2003',
40,
40
)

ctx.font = '20px Arial'

ctx.fillText(
'Traumacore',
canvas.width - 220,
60
)

const link = document.createElement('a')

link.download = 'lost_memory.png'

link.href = canvas.toDataURL('image/png')

link.click()

}

img.src = preview.src

}

/* 雪花 */

function createSnow(){

const snow = document.getElementById('snow')

for(let i=0;i<40;i++){

const s = document.createElement('span')

s.style.left = Math.random()*100+'vw'

s.style.animationDuration =
(Math.random()*5+5)+'s'

s.style.opacity = Math.random()

snow.appendChild(s)

}

}

createSnow()

</script>

</body>
</html>
