<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>lost_memory.exe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#d8d2d8;
font-family:Arial,sans-serif;
overflow-x:hidden;
color:white;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
pointer-events:none;
opacity:.08;
background-image:
radial-gradient(circle,#fff 1px,transparent 1px);
background-size:4px 4px;
animation:noise 0.2s infinite;
}

@keyframes noise{
0%{transform:translate(0,0)}
25%{transform:translate(1px,-1px)}
50%{transform:translate(-1px,1px)}
75%{transform:translate(1px,1px)}
100%{transform:translate(0,0)}
}

.snow{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.snow span{
position:absolute;
top:-10px;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.7;
animation:snowfall linear infinite;
}

@keyframes snowfall{
to{
transform:translateY(110vh);
}
}

header{
padding:24px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,.08);
border-bottom:1px solid rgba(255,255,255,.1);
}

header h1{
font-size:52px;
font-weight:200;
letter-spacing:4px;
}

header p{
opacity:.7;
margin-top:10px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:24px;
padding:24px;
}

.panel{
width:320px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(12px);
border-radius:28px;
padding:24px;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

.panel h2{
margin-bottom:20px;
font-weight:300;
}

.preview{
flex:1;
min-height:85vh;
border-radius:32px;
background:rgba(0,0,0,.2);
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.preview img{
max-width:90%;
max-height:85vh;
border-radius:18px;
transition:0.4s;
box-shadow:0 0 60px rgba(0,0,0,.4);
}

.scanlines{
position:absolute;
inset:0;
pointer-events:none;
background:
linear-gradient(
to bottom,
transparent 50%,
rgba(255,255,255,.04) 51%
);
background-size:100% 4px;
opacity:.3;
mix-blend-mode:overlay;
}

.topText{
position:absolute;
top:20px;
left:20px;
opacity:.7;
letter-spacing:4px;
font-size:14px;
}

.time{
position:absolute;
bottom:24px;
left:24px;
opacity:.7;
font-size:14px;
line-height:1.8;
letter-spacing:2px;
}

.quote{
position:absolute;
right:24px;
bottom:24px;
max-width:220px;
opacity:.7;
font-size:18px;
line-height:1.7;
}

button,
select,
input[type=range]{

width:100%;
margin-top:14px;
padding:14px;
border:none;
border-radius:18px;
background:#f3dfe7;
font-size:15px;
}

input[type=file]{
margin-top:16px;
width:100%;
}

label{
display:block;
margin-top:18px;
opacity:.8;
font-size:14px;
}

.glitch{
animation:glitch 2s infinite;
}

@keyframes glitch{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(2px,-2px)}
60%{transform:translate(-1px,1px)}
80%{transform:translate(1px,-1px)}
100%{transform:translate(0)}
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.panel{
width:100%;
}

.preview{
min-height:60vh;
}

header h1{
font-size:38px;
}

}

</style>
</head>

<body>

<div class="snow" id="snow"></div>

<header class="glitch">
<h1>lost_memory.exe</h1>
<p>traumacore / dreamcore editor</p>
</header>

<div class="container">

<div class="panel">

<h2>Upload Memory</h2>

<input type="file" id="upload">

<select id="preset">
<option value="trauma">Traumacore</option>
<option value="dream">Dreamcore</option>
<option value="vhs">VHS</option>
<option value="ccd">Old CCD</option>
<option value="emo">Emo Web</option>
</select>

<label>Blur</label>
<input type="range" id="blur" min="0" max="10" value="1">

<label>Brightness</label>
<input type="range" id="brightness" min="50" max="150" value="90">

<label>Contrast</label>
<input type="range" id="contrast" min="50" max="150" value="75">

<label>Saturation</label>
<input type="range" id="saturation" min="0" max="150" value="60">

<button onclick="downloadImage()">
Export PNG
</button>

<p style="margin-top:24px;opacity:.5;">
everything feels far away.
</p>

</div>

<div class="preview">

<div class="topText">
PLAY ▶ REC ●
</div>

<img
id="previewImage"
src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
/>

<div class="scanlines"></div>

<div class="time">
PM 11:47<br>
MAR.15 2003
</div>

<div class="quote">
“I can’t remember what it felt like anymore.”
</div>

</div>

</div>

<script>

const upload = document.getElementById('upload')
const preview = document.getElementById('previewImage')

const blur = document.getElementById('blur')
const brightness = document.getElementById('brightness')
const contrast = document.getElementById('contrast')
const saturation = document.getElementById('saturation')
const preset = document.getElementById('preset')

upload.addEventListener('change',(e)=>{

const file = e.target.files[0]

if(file){

preview.src = URL.createObjectURL(file)

}

})

function updateFilter(){

let extra = ''

if(preset.value === 'dream'){
extra = ' hue-rotate(-10deg)'
}

if(preset.value === 'vhs'){
extra = ' sepia(10%)'
}

if(preset.value === 'ccd'){
extra = ' saturate(120%) contrast(85%)'
}

if(preset.value === 'emo'){
extra = ' grayscale(30%)'
}

preview.style.filter = `
blur(${blur.value}px)
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
${extra}
`

}

blur.oninput = updateFilter
brightness.oninput = updateFilter
contrast.oninput = updateFilter
saturation.oninput = updateFilter
preset.onchange = updateFilter

updateFilter()

function downloadImage(){

const canvas = document.createElement('canvas')
const ctx = canvas.getContext('2d')

const img = preview

canvas.width = img.naturalWidth
canvas.height = img.naturalHeight

let filter = `
blur(${blur.value}px)
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
`

if(preset.value === 'dream'){
filter += ' hue-rotate(-10deg)'
}

if(preset.value === 'vhs'){
filter += ' sepia(10%)'
}

if(preset.value === 'ccd'){
filter += ' saturate(120%) contrast(85%)'
}

if(preset.value === 'emo'){
filter += ' grayscale(30%)'
}

ctx.filter = filter

ctx.drawImage(img,0,0)

const link = document.createElement('a')

link.download = 'lost_memory.png'

link.href = canvas.toDataURL('image/png')

link.click()

}

function createSnow(){

const snow = document.getElementById('snow')

for(let i=0;i<60;i++){

const s = document.createElement('span')

s.style.left = Math.random()*100+'vw'

s.style.animationDuration =
Math.random()*5+5+'s'

s.style.opacity = Math.random()

s.style.transform =
`scale(${Math.random()*2})`

snow.appendChild(s)

}

}

createSnow()

</script>

</body>
</html>
